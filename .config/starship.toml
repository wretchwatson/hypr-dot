# starship.toml.template
format = """
[‚ĖĎ‚Ėí‚Ėď](#4D71B1)\
[ ůį≠ü ](bg:#4D71B1 fg:#0F1A19)\
[Óāī](fg:#4D71B1 bg:#3F61A1)\
$directory\
[Óāī](fg:#3F61A1 bg:#5F759E)\
$git_branch\
$git_status\
[Óāī](fg:#5F759E bg:#0F1A19)\
$nodejs\
$rust\
$golang\
$php\
[Óāī](fg:#0F1A19 bg:#0F1A19)\
$time\
[Óāī ](fg:#0F1A19)\
\n$character"""

right_format = """$cmd_duration"""

[directory]
style = "fg:#0F1A19 bg:#3F61A1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "bg:#5F759E"
format = "[[ $symbol $branch ](fg:#bfcde4 bg:#5F759E)]($style)"

[git_status]
style = "bg:#5F759E"
format = "[[($all_status$ahead_behind )](fg:#4D71B1 bg:#5F759E)]($style)"

[nodejs]
symbol = "Óúė"
style = "bg:#0F1A19"
format = "[[ $symbol ($version) ](fg:#6683B6 bg:#0F1A19)]($style)"

[rust]
symbol = "Óě®"
style = "bg:#0F1A19"
format = "[[ $symbol ($version) ](fg:#6683B6 bg:#0F1A19)]($style)"

[golang]
symbol = "Óėß"
style = "bg:#0F1A19"
format = "[[ $symbol ($version) ](fg:#6683B6 bg:#0F1A19)]($style)"

[php]
symbol = "Óėą"
style = "bg:#0F1A19"
format = "[[ $symbol ($version) ](fg:#6683B6 bg:#0F1A19)]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#0F1A19"
format = "[[ Ôźļ $time ](fg:#bfcde4 bg:#0F1A19)]($style)"

[cmd_duration]
min_time = 500
format = "[ÔČí $duration](bold #6683B6)"

[character]
success_symbol = "[ůįĄõ ](bold #6683B6)"
error_symbol = "[ůįĄõ ](bold #3F61A1)"
