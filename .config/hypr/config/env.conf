env = XCURSOR_THEME,capitaine-cursors-light
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,capitaine-cursors-light
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORMTHEME,qt6ct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Electron ve Chromium tabanlı uygulamaları (Chrome, Discord, VSCode vs)
# XWayland yerine saf Wayland modunda çalıştırmak için gerekli parametreler
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1
env = GBM_BACKEND,nvidia-drm
