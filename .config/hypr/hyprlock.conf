source = $HOME/.cache/wal/colors-hyprland.conf

general {
    grace = 0
    disable_loading = true
    no_fade_in = false
}

background {
    monitor =
    path = /home/ridvan/.local/share/wallpapers/wallhaven-rqy67j.jpg
    color = $background
    blur_passes = 2
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color1
    inner_color = $background
    font_color = $foreground
    fade_on_empty = true
    placeholder_text = <i>Giriş yap canım...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $foreground
    font_size = 64
    font_family = Comfortaa
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hoşgeldin, $USER
    color = $foreground
    font_size = 20
    font_family = Comfortaa
    position = 0, 10
    halign = center
    valign = center
}
